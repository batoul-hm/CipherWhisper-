version: '3.8'

services:
  mysql:
    image: mysql:latest
    container_name: mysql-se
    command: --max_allowed_packet=256M
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: BatoulTel 
      MYSQL_USER: batoul
      MYSQL_PASSWORD: root
    ports:
      - "3307:3306"
    volumes:
      - ./data:/var/lib/mysql

  php:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: php-se
    ports:
      - "8082:80"
    volumes:
      - ./src:/var/www/html
    depends_on:
      - mysql

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: phpmyadmin-se
    environment:
      PMA_HOST: mysql
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "8081:80"
    depends_on:
      - mysql
